<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetVic - Casa de Apostas</title>
  <style>
    body { font-family: Arial, sans-serif; background: #121212; color: #fff; padding: 20px; }
    h1, h2 { color: #ffcc00; }
    .section { margin-bottom: 30px; }
    input, button { padding: 10px; margin: 5px 0; }
    button { cursor: pointer; }
    .result { margin-top: 10px; color: #0f0; }
  </style>
</head>
<body>
  <h1>💰 BetVic</h1>

  <div class="section">
    <h2>Criar Usuário</h2>
    <input type="text" id="novo-nome" placeholder="Nome do usuário">
    <button onclick="criarUsuario()">Criar</button>
    <div class="result" id="criar-result"></div>
  </div>

  <div class="section">
    <h2>Depositar</h2>
    <input type="text" id="deposit-user" placeholder="ID do usuário">
    <input type="number" id="deposit-amount" placeholder="Valor">
    <button onclick="depositar()">Depositar</button>
    <div class="result" id="deposit-result"></div>
  </div>

  <div class="section">
    <h2>Sacar</h2>
    <input type="text" id="saque-user" placeholder="ID do usuário">
    <input type="number" id="saque-amount" placeholder="Valor">
    <button onclick="sacar()">Sacar</button>
    <div class="result" id="saque-result"></div>
  </div>

  <script>
    const API_URL = "http://localhost:3000";

    async function criarUsuario() {
      const nome = document.getElementById("novo-nome").value;
      const res = await fetch(`${API_URL}/criar-usuario`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome })
      });
      const data = await res.json();
      document.getElementById("criar-result").innerText = `Usuário criado! ID: ${data.id}`;
    }

    async function depositar() {
      const userId = document.getElementById("deposit-user").value;
      const valor = document.getElementById("deposit-amount").value;
      const res = await fetch(`${API_URL}/depositar`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, valor: Number(valor) })
      });
      const data = await res.text();
      document.getElementById("deposit-result").innerText = data;
    }

    async function sacar() {
      const userId = document.getElementById("saque-user").value;
      const valor = document.getElementById("saque-amount").value;
      const res = await fetch(`${API_URL}/sacar`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, valor: Number(valor) })
      });
      const data = await res.text();
      document.getElementById("saque-result").innerText = data;
    }
  </script>
</body>
</html>
